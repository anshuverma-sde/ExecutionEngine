# Alembic configuration for the Instant Strike Execution Engine.
# Migrations live co-located with models in app/external/postgres/migrations/.

[alembic]
# Path to the migration environment script
script_location = app/external/postgres/migrations

# Template for version file names
file_template = %%(rev)s_%%(slug)s

# Prepend sys.path with this path so app can be imported
prepend_sys_path = .

# Truncate long revision strings for filenames
truncate_slug_length = 40

# Set timezone for revision file timestamps
timezone = UTC

# Max chars for "revisions" column in alembic_version table
version_path_separator = os

# SQLAlchemy URL — overridden at runtime by env.py reading DATABASE_URL
sqlalchemy.url = postgresql+asyncpg://user:pass@postgres:5432/engine

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
