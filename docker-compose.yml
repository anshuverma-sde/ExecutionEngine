version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: engine
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d engine"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    command: >
      celery -A app.external.celery.app worker
      --loglevel=info
      --concurrency=4
      --queues=notifications,reconciliation,default
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    command: >
      celery -A app.external.celery.app beat
      --loglevel=info
      --pidfile=/tmp/celerybeat.pid
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  webhook-mock:
    build:
      context: ./docker/webhook_mock
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    restart: unless-stopped

volumes:
  pgdata:
